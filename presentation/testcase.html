<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team 4: QA Test Case</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background-color: #eee; }
        .test-area { border: 2px dashed #007bff; padding: 20px; display: inline-block; }
        label { display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>Sample Form for Testing</h3>
    <div class="test-area">
        <form id="qa-test-form">
            <label for="user-email">Required Email:</label>
            <!-- The 'required' attribute triggers the browser's built-in validation [3] -->
            <input type="email" id="user-email" name="user-email" required>
            
            <label for="comments">Comments (Optional):</label>
            <textarea id="comments" name="comments"></textarea>
            
            <br><br>
            <button type="submit">Submit Form</button>
        </form>
    </div>
    <script>
        console.log("QA Test Page Loaded. Open the Console to monitor for errors [7].");
    </script>
</body>
</html>
